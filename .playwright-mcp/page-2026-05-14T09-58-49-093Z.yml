      - blockquote [ref=e1815]:
        - paragraph [ref=e1816]: 经过前面十几天的鏖战也是终于来到了项目实战环节。接下来，通过一个完整的实战项目来把前面学到的知识串联起来，构建一个真正可用的RAG系统。
      - heading "一、项目背景" [level=2] [ref=e1817]:
        - link "一、项目背景" [ref=e1818] [cursor=pointer]:
          - /url: "#/chapter8/01_env_architecture?id=%e4%b8%80%e3%80%81%e9%a1%b9%e7%9b%ae%e8%83%8c%e6%99%af"
      - paragraph [ref=e1819]:
        - text: 这个项目的灵感来自于笔者前段时间刷视频时，偶然看到了一个有趣的开源项目介绍——
        - link "程序员做饭指南" [ref=e1820] [cursor=pointer]:
          - /url: https://github.com/Anduin2017/HowToCook
        - text: 。这是一个菜谱项目，用Markdown格式记录了各种菜品的制作方法，从简单的家常菜到复杂的宴客菜，应有尽有。更完美的是，这个项目中每道菜的Markdown文件都严格使用统一的小标题。
      - paragraph [ref=e1821]:
        - text: 看到这个项目，笔者立刻想到：能不能构建一个智能问答系统来解决我的选择困难症？每天面对"今天吃什么"这个世纪难题，如果有个AI助手能根据我的需求推荐菜品、告诉我怎么做，那该多好！于是就有了搭建这个
        - strong [ref=e1822]: 尝尝咸淡RAG系统
        - text: 的想法。
      - heading "二、环境配置" [level=2] [ref=e1823]:
        - link "二、环境配置" [ref=e1824] [cursor=pointer]:
          - /url: "#/chapter8/01_env_architecture?id=%e4%ba%8c%e3%80%81%e7%8e%af%e5%a2%83%e9%85%8d%e7%bd%ae"
      - heading "2.1 创建虚拟环境" [level=3] [ref=e1825]:
        - link "2.1 创建虚拟环境" [ref=e1826] [cursor=pointer]:
