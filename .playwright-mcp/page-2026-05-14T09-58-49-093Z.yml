      - heading "三、项目架构" [level=2] [ref=e1850]:
        - link "三、项目架构" [ref=e1851] [cursor=pointer]:
          - /url: "#/chapter8/01_env_architecture?id=%e4%b8%89%e3%80%81%e9%a1%b9%e7%9b%ae%e6%9e%b6%e6%9e%84"
      - heading "3.1 项目目标" [level=3] [ref=e1852]:
        - link "3.1 项目目标" [ref=e1853] [cursor=pointer]:
          - /url: "#/chapter8/01_env_architecture?id=_31-%e9%a1%b9%e7%9b%ae%e7%9b%ae%e6%a0%87"
      - paragraph [ref=e1854]: 我们将基于HowToCook项目的菜谱数据，构建一个智能的食谱问答系统。用户可以：
      - list [ref=e1855]:
        - listitem [ref=e1856]: 询问具体菜品的制作方法："宫保鸡丁怎么做？"
        - listitem [ref=e1857]: 寻求菜品推荐："推荐几个简单的素菜"
        - listitem [ref=e1858]: 获取食材信息："红烧肉需要什么食材？"
      - heading "3.2 数据分析" [level=3] [ref=e1859]:
        - link "3.2 数据分析" [ref=e1860] [cursor=pointer]:
          - /url: "#/chapter8/01_env_architecture?id=_32-%e6%95%b0%e6%8d%ae%e5%88%86%e6%9e%90"
      - heading "3.2.1 文档分析" [level=4] [ref=e1861]:
        - link "3.2.1 文档分析" [ref=e1862] [cursor=pointer]:
          - /url: "#/chapter8/01_env_architecture?id=_321-%e6%96%87%e6%a1%a3%e5%88%86%e6%9e%90"
      - paragraph [ref=e1863]: HowToCook项目包含了大约300多个Markdown格式的菜谱文件。这些菜谱有两个关键特点：一是结构高度规整，每个文件都严格按照统一的格式来组织内容；二是内容篇幅较短，单个菜谱通常在700字左右。
      - paragraph [ref=e1864]: 打开任意一个菜谱文件，可以发现它们都遵循着相似的结构模式。通常以菜品做法作为一级标题，开头会有一段简介和难度评级，然后分为"必备原料和工具"、"计算"、"操作"、"附加内容"等几个主要部分。比如西红柿炒鸡蛋这道菜：
      - generic [ref=e1865]:
        - code [ref=e1866]: "# 西红柿炒鸡蛋的做法 西红柿炒蛋是中国家常几乎最常见的一道菜肴... 预估烹饪难度：★★ ## 必备原料和工具 * 西红柿 * 鸡蛋 * 食用油... ## 计算 每次制作前需要确定计划做几份... * 西红柿 = 1 个（约 180g） * 份数 * 鸡蛋 = 1.5 个 * 份数，向上取整... ## 操作 - 西红柿洗净 - 可选：去掉西红柿的外表皮... ## 附加内容 这道菜根据不同的口味偏好，存在诸多版本..."
        - button "Copy to clipboard Error Copied" [ref=e1867] [cursor=pointer]:
          - text: Copy to clipboard
          - generic: Error
          - generic: Copied
        - text: markdown
      - paragraph [ref=e1868]:
        - text: 从数据上来看，这种高度结构化的数据不需要过多处理就可以直接用于RAG系统构建。还记得我们在第2章学过的
        - link "Markdown结构分块" [ref=e1869] [cursor=pointer]:
          - /url: "#/../chapter2/05_text_chunking?id=34-%e5%9f%ba%e4%ba%8e%e6%96%87%e6%a1%a3%e7%bb%93%e6%9e%84%e7%9a%84%e5%88%86%e5%9d%97"
          - strong [ref=e1870]: Markdown结构分块
        - text: 吗？这个数据完全契合那种按标题层级分块的思路。更重要的是，每个菜谱文件的内容都不算太长，单个章节的内容通常在几百字左右，这意味着可以直接按照标题进行分块，而不用担心第2章提到的那个问题——某个章节内容过长超出模型上下文窗口，需要与常规分块方法（如
        - code [ref=e1871]: RecursiveCharacterTextSplitter
        - text: ）组合使用。
      - heading "3.2.2 结构分块局限" [level=4] [ref=e1872]:
        - link "3.2.2 结构分块局限" [ref=e1873] [cursor=pointer]:
          - /url: "#/chapter8/01_env_architecture?id=_322-%e7%bb%93%e6%9e%84%e5%88%86%e5%9d%97%e5%b1%80%e9%99%90"
      - paragraph [ref=e1874]: 虽然Markdown结构分块看起来很理想，但在实际使用中可能会遇到一个问题：按照标题严格分块会把内容切得太细，导致上下文信息不完整。比如用户问"宫保鸡丁怎么做"，如果严格按标题分块，可能只检索到"操作"这一个章节，但缺少了"必备原料和工具"的信息，LLM就无法给出完整的制作指导。甚至有时候检索到的是"附加内容"中的某个变化做法，没有基础制作步骤，回答就会显得莫名其妙。如果你尝试直接把整个菜谱文档作为一个块，可以发现效果反而比结构分块要好，因为上下文信息是完整的。
      - paragraph [ref=e1875]: 为了解决这个矛盾，可以采用父子文本块的策略：用小的子块进行精确检索，但在生成时传递完整的父文档给LLM。这种方法在第3章的索引优化中虽然没有专门介绍，但本质上也属于上下文拓展的一种应用。通过这种方式，我们既保证了检索的精确性，又确保了生成时上下文的完整性。
      - blockquote [ref=e1876]:
        - paragraph [ref=e1877]: 反正都是把整个文档传给LLM，我为什么不直接用整个文档分块呢？
      - paragraph [ref=e1878]: 这个问题问得很好！关键在于当用户问"宫保鸡丁需要什么调料"时，如果直接用整个文档做向量检索，这个具体问题在整个文档中的占比很小，很可能检索不到或者排名很靠后。但如果用小块检索，"必备原料和工具"这个章节就能精确匹配用户的需求。
      - paragraph [ref=e1879]: 简单来说，这种设计是"小块检索，大块生成"——用小块的精确性找到相关内容，用大块的完整性保证回答质量。如果直接用整个文档分块，就失去了检索的精确性优势。
      - heading "3.3 整体架构" [level=3] [ref=e1880]:
        - link "3.3 整体架构" [ref=e1881] [cursor=pointer]:
          - /url: "#/chapter8/01_env_architecture?id=_33-%e6%95%b4%e4%bd%93%e6%9e%b6%e6%9e%84"
