    - article [ref=e22]:
      - generic [ref=e1148]: 2506 字 | 7 分钟
      - heading "第二节 评估常用工具" [level=1] [ref=e1149]:
        - link "第二节 评估常用工具" [ref=e1150] [cursor=pointer]:
          - /url: "#/chapter6/19_common_tools?id=%e7%ac%ac%e4%ba%8c%e8%8a%82-%e8%af%84%e4%bc%b0%e5%b8%b8%e7%94%a8%e5%b7%a5%e5%85%b7"
      - paragraph [ref=e1151]: 了解了评估的基本原理之后，来介绍几个RAG评估工具，它们各自代表了不同的设计哲学和应用场景。
      - heading "一、LlamaIndex Evaluation" [level=2] [ref=e1152]:
        - link "一、LlamaIndex Evaluation" [ref=e1153] [cursor=pointer]:
          - /url: "#/chapter6/19_common_tools?id=%e4%b8%80%e3%80%81llamaindex-evaluation"
      - paragraph [ref=e1154]:
        - code [ref=e1155]: LlamaIndex Evaluation
        - text: 是
        - strong [ref=e1156]: 深度集成于LlamaIndex框架内的评估模块
        - text: ，专为使用该框架构建的RAG应用提供无缝的评估能力。作为RAG开发框架的原生组件，其核心定位是
        - strong [ref=e1157]: 为开发者在开发、调试和迭代周期中提供快速、灵活的嵌入式评估解决方案
        - text: 。它强调与开发流程的紧密结合，允许开发者在构建过程中即时验证和对比不同RAG策略的性能
        - superscript [ref=e1158]:
          - link "1" [ref=e1159] [cursor=pointer]:
            - /url: "#fn-1"
        - text: 。
      - blockquote [ref=e1160]:
        - paragraph [ref=e1161]:
          - strong [ref=e1162]: 适用场景
          - text: ：对于深度使用
          - code [ref=e1163]: LlamaIndex
          - text: 框架构建RAG应用的开发者而言，其内置评估模块是无缝集成的首选，提供了一站式的开发与评估体验。
      - heading "1.1 核心理念与工作流" [level=3] [ref=e1164]:
        - link "1.1 核心理念与工作流" [ref=e1165] [cursor=pointer]:
          - /url: "#/chapter6/19_common_tools?id=_11-%e6%a0%b8%e5%bf%83%e7%90%86%e5%bf%b5%e4%b8%8e%e5%b7%a5%e4%bd%9c%e6%b5%81"
      - paragraph [ref=e1166]:
        - code [ref=e1167]: LlamaIndex
        - text: 的评估理念是利用LLM作为“裁判”，以自动化的方式对RAG系统的各个环节进行打分。这种方法在很多场景下无需预先准备“标准答案”，大大降低了评估门槛。其典型工作流如下：
      - list [ref=e1168]:
        - listitem [ref=e1169]:
          - strong [ref=e1170]: 准备评估数据集
          - text: ：通过
          - code [ref=e1171]: DatasetGenerator
          - text: 从文档中自动生成问题-答案对（
          - code [ref=e1172]: QueryResponseDataset
          - text: ），或加载一个已有的数据集。为了效率，通常会将生成的数据集保存到本地，避免重复生成。
        - listitem [ref=e1173]:
          - strong [ref=e1174]: 构建查询引擎
          - text: ：搭建一个或多个需要被评估的RAG查询引擎（
          - code [ref=e1175]: QueryEngine
          - text: ）。这是进行对比实验的基础。
        - listitem [ref=e1176]:
          - strong [ref=e1177]: 初始化评估器
          - text: ：根据评估维度，选择并初始化一个或多个评估器，如
          - code [ref=e1178]: FaithfulnessEvaluator
          - text: （忠实度）和
          - code [ref=e1179]: RelevancyEvaluator
          - text: （相关性）。
        - listitem [ref=e1180]:
          - strong [ref=e1181]: 执行批量评估
          - text: ：使用
          - code [ref=e1182]: BatchEvalRunner
          - text: 来管理整个评估过程。它能够高效地（可并行）将查询引擎应用于数据集中的所有问题，并调用所有评估器进行打分。
        - listitem [ref=e1183]:
          - strong [ref=e1184]: 分析结果
          - text: ：从评估运行器返回的结果中，计算各项指标的平均分，从而量化地对比不同RAG策略的优劣。
      - heading "1.2 应用实例：对比不同检索策略" [level=3] [ref=e1185]:
        - link "1.2 应用实例：对比不同检索策略" [ref=e1186] [cursor=pointer]:
          - /url: "#/chapter6/19_common_tools?id=_12-%e5%ba%94%e7%94%a8%e5%ae%9e%e4%be%8b%ef%bc%9a%e5%af%b9%e6%af%94%e4%b8%8d%e5%90%8c%e6%a3%80%e7%b4%a2%e7%ad%96%e7%95%a5"
      - paragraph [ref=e1187]: 下面示例基于我们在第三章学习的“句子窗口检索”技术，通过评估，对比它与“常规分块检索”在响应质量上的差异。
      - paragraph [ref=e1188]:
        - strong [ref=e1189]: 代码示例：
      - generic [ref=e1190]:
        - code [ref=e1191]:
          - text: "# ... (省略数据加载、文档解析、查询引擎构建等步骤) # 1. 初始化评估器 # 定义需要评估的指标：忠实度和相关性 faithfulness_evaluator = FaithfulnessEvaluator(llm=Settings.llm) relevancy_evaluator = RelevancyEvaluator(llm=Settings.llm) evaluators = {\"faithfulness\": faithfulness_evaluator, \"relevancy\": relevancy_evaluator} # 2. 使用BatchEvalRunner执行批量评估 # 从数据集中获取查询列表 queries = response_eval_dataset.queries # 评估“句子窗口检索”引擎 print(\"\\n=== 评估句子窗口检索 ===\") sentence_runner = BatchEvalRunner(evaluators, workers=2, show_progress=True) sentence_response_results = await sentence_runner.aevaluate_queries( queries=queries, query_engine=sentence_query_engine ) # 评估“常规分块检索”引擎 print(\"\\n=== 评估常规分块检索 ===\") base_runner = BatchEvalRunner(evaluators, workers=2, show_progress=True) base_response_results = await base_runner.aevaluate_queries( queries=queries, query_engine=base_query_engine ) # 3. 分析并打印结果 # ... (省略结果计算与打印的辅助函数) print("
          - generic [ref=e1192]:
            - text: "f\"句子窗口检索: 忠实度="
            - generic [ref=e1193]: "{sentence_faith:.1%}"
            - text: ", 相关性="
            - generic [ref=e1194]: "{sentence_rel:.1%}"
            - text: "\""
          - text: ) print(
          - generic [ref=e1195]:
            - text: "f\"常规分块检索: 忠实度="
            - generic [ref=e1196]: "{base_faith:.1%}"
            - text: ", 相关性="
            - generic [ref=e1197]: "{base_rel:.1%}"
            - text: "\""
          - text: )
        - button "Copy to clipboard Error Copied" [ref=e1198] [cursor=pointer]:
          - text: Copy to clipboard
          - generic: Error
          - generic: Copied
        - text: python
      - paragraph [ref=e1199]:
        - strong [ref=e1200]: 输出如下：
      - generic [ref=e1201]:
        - code [ref=e1202]: "============================================================ 响应评估结果对比 ============================================================ 句子窗口检索: 忠实度: 53.3% 相关性: 66.7% 常规分块检索: 忠实度: 0.0% 相关性: 6.7%"
        - button "Copy to clipboard Error Copied" [ref=e1203] [cursor=pointer]:
          - text: Copy to clipboard
          - generic: Error
          - generic: Copied
        - text: bash
      - paragraph [ref=e1204]: 通过这个结果可以看出，在本次实验中“句子窗口检索”的忠实度和相关性上均显著优于“常规分块检索”。
      - heading "1.3 核心评估维度" [level=3] [ref=e1205]:
        - link "1.3 核心评估维度" [ref=e1206] [cursor=pointer]:
          - /url: "#/chapter6/19_common_tools?id=_13-%e6%a0%b8%e5%bf%83%e8%af%84%e4%bc%b0%e7%bb%b4%e5%ba%a6"
      - paragraph [ref=e1207]:
        - text: LlamaIndex提供了丰富的评估器，覆盖了从检索到响应的各个环节。上述示例中主要使用了
        - strong [ref=e1208]: 响应评估
        - text: 维度：
      - list [ref=e1209]:
        - listitem [ref=e1210]:
          - code [ref=e1211]: Faithfulness
          - text: "(忠实度): 评估生成的答案是否完全基于检索到的上下文，是检测“幻觉”现象的关键指标。分数越高，说明答案越可靠。"
        - listitem [ref=e1212]:
          - code [ref=e1213]: Relevancy
          - text: "(相关性): 评估生成的答案与用户提出的原始问题是否直接相关，确保答案切题。"
      - paragraph [ref=e1214]:
        - text: 此外，它还支持专门的
        - strong [ref=e1215]: 检索评估
        - text: 维度，如：
      - list [ref=e1216]:
        - listitem [ref=e1217]:
          - code [ref=e1218]: Hit Rate
          - text: "(命中率): 评估检索到的上下文中是否包含了正确的答案。"
        - listitem [ref=e1219]:
          - code [ref=e1220]: MRR
          - text: "(平均倒数排名): 衡量找到正确答案的效率，排名越靠前得分越高。"
      - heading "二、RAGAS" [level=2] [ref=e1221]:
        - link "二、RAGAS" [ref=e1222] [cursor=pointer]:
          - /url: "#/chapter6/19_common_tools?id=%e4%ba%8c%e3%80%81ragas"
      - paragraph [ref=e1223]:
        - text: RAGAS（RAG Assessment）是一个
        - strong [ref=e1224]: 独立的、专注于RAG的开源评估框架
        - text: 。提供了一套全面的指标来量化RAG管道的检索和生成两大核心环节的性能。其最显著的特色是支持
        - strong [ref=e1225]: 无参考评估
        - text: ，即在许多场景下无需人工标注的“标准答案”即可进行评估，极大地降低了评估成本。现对RAG管道的持续监控和改进。如果你需要一个轻量级、与具体RAG实现解耦、能够快速对核心指标进行量化评估的工具时，
        - code [ref=e1226]: RAGAS
        - text: 是一个理想的选择。
      - heading "2.1 设计理念" [level=3] [ref=e1227]:
        - link "2.1 设计理念" [ref=e1228] [cursor=pointer]:
          - /url: "#/chapter6/19_common_tools?id=_21-%e8%ae%be%e8%ae%a1%e7%90%86%e5%bf%b5"
      - paragraph [ref=e1229]:
        - code [ref=e1230]: RAGAS
        - text: 的核心思想是通过分析问题（
        - code [ref=e1231]: question
        - text: ）、生成的答案（
        - code [ref=e1232]: answer
        - text: ）和检索到的上下文（
        - code [ref=e1233]: context
        - text: ）三者之间的关系，来综合评估RAG系统的性能。它将复杂的评估问题分解为几个简单、可量化的维度。
      - heading "2.2 工作流程与核心指标" [level=3] [ref=e1234]:
        - link "2.2 工作流程与核心指标" [ref=e1235] [cursor=pointer]:
          - /url: "#/chapter6/19_common_tools?id=_22-%e5%b7%a5%e4%bd%9c%e6%b5%81%e7%a8%8b%e4%b8%8e%e6%a0%b8%e5%bf%83%e6%8c%87%e6%a0%87"
      - paragraph [ref=e1236]: RAGAS的评估流程非常简洁，通常遵循以下步骤：
      - paragraph [ref=e1237]:
        - text: （1）
        - strong [ref=e1238]: 准备数据集
        - text: ：根据官方文档，一个标准的评估数据集应包含
        - code [ref=e1239]: question
        - text: （问题）、
        - code [ref=e1240]: answer
        - text: （RAG系统生成的答案）、
        - code [ref=e1241]: contexts
        - text: （检索到的上下文）以及
        - code [ref=e1242]: ground_truth
        - text: （标准参考答案）这四列。不过，
        - code [ref=e1243]: ground_truth
        - text: 对于计算
        - code [ref=e1244]: context_recall
        - text: 等指标是必需的，但对于
        - code [ref=e1245]: faithfulness
        - text: 等指标则是可选的。
      - paragraph [ref=e1246]:
        - text: （2）
        - strong [ref=e1247]: 运行评估
        - text: ：调用
        - code [ref=e1248]: ragas.evaluate()
        - text: 函数，传入准备好的数据集和需要评估的指标列表。
      - paragraph [ref=e1249]:
        - text: （3）
        - strong [ref=e1250]: 分析结果
        - text: ：获取一个包含各项指标量化分数的评估报告。
      - paragraph [ref=e1251]: 其核心评估指标包括：
      - list [ref=e1252]:
        - listitem [ref=e1253]:
          - code [ref=e1254]: faithfulness
          - text: ": 衡量生成的答案中有多少比例的信息是可以由检索到的上下文所支持的。"
        - listitem [ref=e1255]:
          - code [ref=e1256]: context_recall
          - text: ": 衡量检索到的上下文与标准答案（"
          - code [ref=e1257]: ground_truth
          - text: ）的对齐程度，即标准答案中的信息是否被上下文完全“召回”。
        - listitem [ref=e1258]:
          - code [ref=e1259]: context_precision
          - text: ": 衡量检索到的上下文中，信噪比如何，即有多少是真正与回答问题相关的。"
        - listitem [ref=e1260]:
          - code [ref=e1261]: answer_relevancy
          - text: ": 评估答案与问题的相关程度。此指标不评估事实准确性，只关注答案是否切题。"
      - heading "三、Phoenix (Arize Phoenix)" [level=2] [ref=e1262]:
        - link "三、Phoenix (Arize Phoenix)" [ref=e1263] [cursor=pointer]:
          - /url: "#/chapter6/19_common_tools?id=%e4%b8%89%e3%80%81phoenix-arize-phoenix"
      - paragraph [ref=e1264]:
        - text: Phoenix (现由Arize维护) 是一个
        - strong [ref=e1265]: 开源的LLM可观测性与评估平台
        - text: 。在RAG评估生态中，它主要扮演
        - strong [ref=e1266]: 生产环境中的可视化分析与故障诊断引擎
        - text: 的角色。它通过捕获LLM应用的轨迹（Traces），提供强大的可视化、切片和聚类分析能力，帮助开发者理解线上真实数据的表现。Phoenix 的核心价值在于
        - strong [ref=e1267]: 从海量生产数据中发现问题、监控性能漂移并进行深度诊断
        - text: ，是连接线下评估与线上运维的关键桥梁。它不仅提供评估指标，更强调对LLM应用进行追踪（Tracing）和可视化分析，从而快速定位问题
        - superscript [ref=e1268]:
          - link "3" [ref=e1269] [cursor=pointer]:
            - /url: "#fn-3"
        - text: 。
      - paragraph [ref=e1270]:
        - img "phoenix"
      - heading "3.1 核心理念" [level=3] [ref=e1271]:
        - link "3.1 核心理念" [ref=e1272] [cursor=pointer]:
          - /url: "#/chapter6/19_common_tools?id=_31-%e6%a0%b8%e5%bf%83%e7%90%86%e5%bf%b5"
      - paragraph [ref=e1273]:
        - code [ref=e1274]: Phoenix
        - text: 的核心是“AI可观测性”，它通过追踪RAG系统内部的每一步调用（如检索、生成等），将整个流程可视化。这使得开发者可以直观地看到每个环节的输入、输出和耗时，并在此基础上进行深入的评估和调试。
      - heading "3.2 工作原理" [level=3] [ref=e1275]:
        - link "3.2 工作原理" [ref=e1276] [cursor=pointer]:
          - /url: "#/chapter6/19_common_tools?id=_32-%e5%b7%a5%e4%bd%9c%e5%8e%9f%e7%90%86"
      - paragraph [ref=e1277]:
        - code [ref=e1278]: Phoenix
        - text: 的工作流程是先通过基于开放标准
        - strong [ref=e1279]: OpenTelemetry
        - text: 的
        - strong [ref=e1280]:
          - text: 代码插桩（
          - code [ref=e1281]: Instrumentation
          - text: ）
        - text: ，在 RAG 应用中集成追踪功能，自动捕获 LLM 调用、函数执行等事件；随后在应用运行过程中持续生成
        - strong [ref=e1282]:
          - text: 追踪数据（
          - code [ref=e1283]: Traces
          - text: ）
        - text: ，记录完整的执行链路；接着在本地启动
        - code [ref=e1284]: Phoenix
        - text: 的 Web 界面，加载并可视化这些追踪数据；最后在 UI 中对失败案例或表现不佳的查询进行筛选、钻取，并借助内置的
        - strong [ref=e1285]:
          - text: 评估器（
          - code [ref=e1286]: Evals
          - text: ）
        - text: 完成深入的评估与调试。
      - paragraph [ref=e1287]: 特色功能：
      - list [ref=e1288]:
        - listitem [ref=e1289]:
          - strong [ref=e1290]: 可视化追踪
          - text: ": 将RAG的执行流程、数据和评估结果进行可视化展示，极大地方便了问题定位。"
        - listitem [ref=e1291]:
          - strong [ref=e1292]: 根本原因分析
          - text: ": 通过可视化的界面，可以轻松地对表现不佳的查询进行切片和钻取。"
        - listitem [ref=e1293]:
          - strong [ref=e1294]:
            - text: 安全护栏 (
            - code [ref=e1295]: Guardrails
            - text: )
          - text: ": 允许为应用添加保护层，防止恶意或错误的输入输出，保障生产环境安全。"
        - listitem [ref=e1296]:
          - strong [ref=e1297]: 数据探索与标注
          - text: ": 提供数据探索、清洗和标注工具，帮助开发者利用生产数据反哺模型和系统优化。"
        - listitem [ref=e1298]:
          - strong [ref=e1299]: 与Arize平台集成
          - text: ":"
          - code [ref=e1300]: Phoenix
          - text: 可以与Arize的商业平台无缝对接，实现生产环境中对RAG系统的持续监控。
      - heading "四、对比建议" [level=2] [ref=e1301]:
        - link "四、对比建议" [ref=e1302] [cursor=pointer]:
