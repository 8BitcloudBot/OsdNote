    - article [ref=e22]:
      - generic [ref=e1479]: 4009 字 | 11 分钟
      - heading "第一节 基于知识图谱的RAG" [level=1] [ref=e1480]:
        - link "第一节 基于知识图谱的RAG" [ref=e1481] [cursor=pointer]:
          - /url: "#/chapter7/20_kg_rag?id=%e7%ac%ac%e4%b8%80%e8%8a%82-%e5%9f%ba%e4%ba%8e%e7%9f%a5%e8%af%86%e5%9b%be%e8%b0%b1%e7%9a%84rag"
      - paragraph [ref=e1482]: 传统RAG框架虽然有效缓解了大型语言模型的知识陈旧和幻觉问题，但在处理复杂查询时仍存在明显局限。依赖非结构化文本向量检索的方式，往往难以捕捉实体间的深层关系，导致上下文检索不精确、信息碎片化，甚至诱发模型产生"幻觉"。为了突破这些瓶颈，将结构化知识图谱融入 RAG 流程的新范式——GraphRAG 诞生。通过利用知识图谱的显式语义关系和图结构优势，GraphRAG能够提供更精准的上下文检索和更强的推理能力，在多跳查询和事实性要求较高的场景中表现尤为出色。
      - heading "一、从传统RAG到知识图谱增强RAG的演进" [level=2] [ref=e1483]:
        - link "一、从传统RAG到知识图谱增强RAG的演进" [ref=e1484] [cursor=pointer]:
          - /url: "#/chapter7/20_kg_rag?id=%e4%b8%80%e3%80%81%e4%bb%8e%e4%bc%a0%e7%bb%9frag%e5%88%b0%e7%9f%a5%e8%af%86%e5%9b%be%e8%b0%b1%e5%a2%9e%e5%bc%barag%e7%9a%84%e6%bc%94%e8%bf%9b"
      - generic [ref=e1485]:
        - img "GraphRAG"
      - heading "1.1 传统RAG框架的固有局限性" [level=3] [ref=e1486]:
        - link "1.1 传统RAG框架的固有局限性" [ref=e1487] [cursor=pointer]:
          - /url: "#/chapter7/20_kg_rag?id=_11-%e4%bc%a0%e7%bb%9frag%e6%a1%86%e6%9e%b6%e7%9a%84%e5%9b%ba%e6%9c%89%e5%b1%80%e9%99%90%e6%80%a7"
      - paragraph [ref=e1488]: 尽管传统 RAG 通过"检索-生成"两阶段流程在一定程度上解决了LLM的知识更新问题，但其基于非结构化文本向量检索的核心机制仍存在几个关键局限。
      - paragraph [ref=e1489]:
        - strong [ref=e1490]: 关系理解的缺失
        - text: ：基于向量的检索主要关注语义相似性，难以捕捉和利用实体之间复杂的、隐含的关系。当查询涉及多实体关联或因果推理时，检索到的文本块之间可能缺乏逻辑联系，导致LLM难以进行有效的综合与推理。
      - paragraph [ref=e1491]:
        - strong [ref=e1492]: 上下文的碎片化
        - text: ：文本被切分成独立的块进行索引，这破坏了原文的结构和上下文连续性。对于需要跨越多个文档或长距离文本进行信息整合的问题，传统RAG往往力不从心。
      - paragraph [ref=e1493]:
        - strong [ref=e1494]: 检索噪声与幻觉风险
        - text: ：检索过程可能返回不相关或仅部分相关的噪声信息，这会干扰LLM的判断，甚至诱发其产生与事实不符的"幻觉"内容。知识图谱的引入被证实能有效减轻模型幻觉，提供更高质量的上下文。
      - paragraph [ref=e1495]:
        - strong [ref=e1496]: 推理能力有限
        - text: ：传统 RAG 的推理能力受限于检索到的线性文本内容，难以支持需要结构化知识进行导航的多跳推理。
      - paragraph [ref=e1497]:
        - strong [ref=e1498]: 跨文档联结能力弱
        - text: ：即便采用较大的切块与滑窗重叠，跨文档/跨章节的实体共现与隐式引用仍难以被显式建模，导致需要“连边”才能回答的问题（如沿因果、时间或供应链关系追踪）召回不足。
      - paragraph [ref=e1499]:
        - strong [ref=e1500]: 实体歧义与别名问题
        - text: ：仅依赖向量相似度很难稳定地区分同名实体（如不同城市/公司/人名），或统一别名、缩写与多语言变体，易造成错误对齐与语义漂移。
      - paragraph [ref=e1501]:
        - strong [ref=e1502]: 时效性与版本一致性不足
        - text: ：文本块往往缺少可计算的时间属性与有效期边界，导致时序敏感问题（如“某公司在某年是否仍为子公司”）难以得到一致答案。
      - paragraph [ref=e1503]: 一个典型示例：
      - list [ref=e1504]:
        - listitem [ref=e1505]: 问题：“2019年收购A公司的企业，其母公司在2021年的主要投资对象是谁？”
        - listitem [ref=e1506]: 传统做法需要检索多段文本并在生成阶段自行拼接与推理；若任一段缺失或存在歧义，整体推理链即会断裂。
      - heading "1.2 知识图谱赋能 RAG 的核心优势" [level=3] [ref=e1507]:
        - link "1.2 知识图谱赋能 RAG 的核心优势" [ref=e1508] [cursor=pointer]:
          - /url: "#/chapter7/20_kg_rag?id=_12-%e7%9f%a5%e8%af%86%e5%9b%be%e8%b0%b1%e8%b5%8b%e8%83%bd-rag-%e7%9a%84%e6%a0%b8%e5%bf%83%e4%bc%98%e5%8a%bf"
      - paragraph [ref=e1509]: 知识图谱通过节点（实体）和边（关系）的网络结构，将离散的知识显式地组织成一个相互连接的语义网络，为克服传统RAG的局限性提供了强有力的解决方案。
      - paragraph [ref=e1510]:
        - strong [ref=e1511]: 结构化语义表达
        - text: ：知识图谱以图的形式直接编码实体间的显式语义关系（如"公司A-收购-公司B"），避免了LLM从文本中进行隐式、可能存在偏差的推断，为复杂查询提供了清晰的导航路径。
      - paragraph [ref=e1512]:
        - strong [ref=e1513]: 增强推理能力
        - text: ：图的结构天然支持多跳推理，系统可以沿着图中的路径遍历，发现间接但关键的知识关联，从而回答需要多步逻辑推导的复杂问题。
      - paragraph [ref=e1514]:
        - strong [ref=e1515]: 事实性与可解释性
        - text: ：基于知识图谱检索的答案可以追溯其在图中的推理路径，这为答案提供了事实依据，极大地增强了系统的可解释性和可信度，有效抑制了幻觉。
      - paragraph [ref=e1516]:
        - strong [ref=e1517]: 异构数据集成
        - text: ：知识图谱能够无缝集成来自不同来源的结构化（如数据库）和非结构化（如文本）数据，形成一个全面、统一的知识视图，这在金融、医疗等需要整合海量异构信息的领域尤为重要。
      - paragraph [ref=e1518]: 进一步地：
      - list [ref=e1519]:
        - listitem [ref=e1520]:
          - strong [ref=e1521]: 语义模式与本体支撑
          - text: ：通过模式（Schema）与本体（Ontology）明确实体类型、关系约束与属性域值，约束推理空间，降低歧义。
        - listitem [ref=e1522]:
          - strong [ref=e1523]: 溯源与置信度管理
          - text: ：边与节点可携带来源、时间戳与置信度，便于在生成时进行来源归因与冲突消解。
        - listitem [ref=e1524]:
          - strong [ref=e1525]: 时间与版本建模
          - text: ：支持时间态边与版本化节点，允许对“历史状态”与“有效区间”进行查询（Time-travel Query）。
      - heading "1.3 GraphRAG：一种范式革新" [level=3] [ref=e1526]:
        - link "1.3 GraphRAG：一种范式革新" [ref=e1527] [cursor=pointer]:
          - /url: "#/chapter7/20_kg_rag?id=_13-graphrag%ef%bc%9a%e4%b8%80%e7%a7%8d%e8%8c%83%e5%bc%8f%e9%9d%a9%e6%96%b0"
      - paragraph [ref=e1528]: GraphRAG将检索的目标从独立的文本片段转变为在知识图谱中寻找相关的实体、关系、路径或子图。这一转变从根本上提升了RAG系统的能力。已有研究与实践报告显示，GraphRAG 在上下文召回、多跳问答准确率、事实一致性与可解释性等关键指标上较传统RAG具有显著优势。这标志着RAG技术从“信息检索”向“知识利用”的范式演进。
      - heading "二、GraphRAG框架的核心架构与工作流程" [level=2] [ref=e1529]:
        - link "二、GraphRAG框架的核心架构与工作流程" [ref=e1530] [cursor=pointer]:
          - /url: "#/chapter7/20_kg_rag?id=%e4%ba%8c%e3%80%81graphrag%e6%a1%86%e6%9e%b6%e7%9a%84%e6%a0%b8%e5%bf%83%e6%9e%b6%e6%9e%84%e4%b8%8e%e5%b7%a5%e4%bd%9c%e6%b5%81%e7%a8%8b"
      - paragraph [ref=e1531]: 大多数GraphRAG框架遵循一个通用的三阶段流程：知识图谱构建、图谱检索与增强生成。
      - heading "2.1 通用架构三阶段" [level=3] [ref=e1532]:
        - link "2.1 通用架构三阶段" [ref=e1533] [cursor=pointer]:
          - /url: "#/chapter7/20_kg_rag?id=_21-%e9%80%9a%e7%94%a8%e6%9e%b6%e6%9e%84%e4%b8%89%e9%98%b6%e6%ae%b5"
      - paragraph [ref=e1534]:
        - strong [ref=e1535]: 知识图谱构建
        - text: 是 GraphRAG 的基础。该阶段的目标是从原始数据中构建一个高质量的知识图谱：
      - list [ref=e1536]:
        - listitem [ref=e1537]: 知识抽取：利用 LLM 或 IE 管线从非/半结构化文本中抽取实体、关系与属性，包含指代消解、别名归一（Normalization）与术语标准化。
        - listitem [ref=e1538]: 质量控制：对三元组进行置信度评估、人机协同抽检与冲突消解；必要时通过规则与本体约束做一致性校验。
        - listitem [ref=e1539]: 图谱融合：进行实体对齐与去重（Entity Resolution），合并跨来源知识并保留来源/时间戳等溯源信息。
        - listitem [ref=e1540]: 存储与索引：落地到图数据库（如Neo4j/NebulaGraph/TigerGraph/Neptune等）并建立必要的属性与关系索引，便于后续高效检索与遍历。
      - paragraph [ref=e1541]:
        - strong [ref=e1542]: 图谱检索
        - text: 阶段，当用户提出查询时，系统不再是简单地进行向量相似度搜索，而是执行更复杂的图谱检索操作。混合检索策略是主流趋势：
      - list [ref=e1543]:
        - listitem [ref=e1544]: 实体定位：先用实体链接（Entity Linking）或向量检索在图中锁定核心实体节点。
        - listitem [ref=e1545]: 子图探索：从命中节点出发，利用图查询语言（如Cypher）或遍历算法进行邻域扩展、路径发现与约束过滤（例如限定关系类型、跳数、时间区间与置信度阈值）。
        - listitem [ref=e1546]: 结构化证据抽取：将路径与关键节点属性序列化为可读证据片段，或生成子图的文本摘要。
        - listitem [ref=e1547]: 高级检索：如GraphRAG采用社区检测（如Leiden）生成多层次摘要，实现“全局-局部”联合检索。
      - paragraph [ref=e1548]: 示例（Cypher）：查询公司A两跳内的收购路径及目标行业。
      - generic [ref=e1549]:
        - code [ref=e1550]: "MATCH (a:Company {name: \"A\"})-[:ACQUIRED]->(b:Company)-[:IN_INDUSTRY]->(i:Industry) RETURN a.name AS acquirer, b.name AS target, i.name AS industry UNION MATCH (a:Company {name: \"A\"})-[:ACQUIRED]->(:Company)-[:ACQUIRED]->(b2:Company)-[:IN_INDUSTRY]->(i2:Industry) RETURN a.name AS acquirer, b2.name AS target, i2.name AS industry;"
        - button "Copy to clipboard Error Copied" [ref=e1551] [cursor=pointer]:
          - text: Copy to clipboard
          - generic: Error
          - generic: Copied
        - text: cypher
      - paragraph [ref=e1552]:
        - strong [ref=e1553]: 增强生成
        - text: 是最后一步，将检索到的结构化知识（如相关实体的属性、实体间的关系路径、描述子图的文本摘要等）与原始查询一同注入到 LLM 提示（Prompt）中。实践要点：
      - list [ref=e1554]:
        - listitem [ref=e1555]: 提示设计：明确要求模型引用“图证据”，并在回答中给出来源与路径（可作为可选的引用附录）。
        - listitem [ref=e1556]: 证据融合：将“结构化三元组/路径”与“原文片段”联合提供，兼顾事实性与文本细节。
        - listitem [ref=e1557]: 约束回答：对敏感领域（财务/医疗）可采用模板化输出与字段校验，减少幻觉。
      - heading "2.2 方法论分类" [level=3] [ref=e1558]:
        - link "2.2 方法论分类" [ref=e1559] [cursor=pointer]:
          - /url: "#/chapter7/20_kg_rag?id=_22-%e6%96%b9%e6%b3%95%e8%ae%ba%e5%88%86%e7%b1%bb"
      - paragraph [ref=e1560]: 根据综述性研究，现有的 GraphRAG 方法大致可以归为三类，反映了知识图谱与 RAG 结合深度的不同。
      - paragraph [ref=e1561]:
        - strong [ref=e1562]: 知识驱动型：
        - text: 检索过程主要或完全依赖于知识图谱。这类方法直接在图上进行查询与推理（如文本转 Cypher/Gremlin），适用于需要强逻辑约束与可解释性的任务。
      - paragraph [ref=e1563]:
        - strong [ref=e1564]: 索引驱动型：
        - text: 将知识图谱的结构信息融入到文本索引。例如用邻居实体/关系充当元数据特征、或将子图摘要拼接到文本后再向量化，以提升召回与重排效果。
      - paragraph [ref=e1565]:
        - strong [ref=e1566]: 混合型：
        - text: 同时使用图检索与文本检索，并对结果统一重排与融合：
      - list [ref=e1567]:
        - listitem [ref=e1568]: 简单事实问答可优先图检索；叙事性/描述性问题可补充文本证据。
        - listitem [ref=e1569]: 对复杂查询，可先图上定位路径，再以路径节点为“导航枢纽”做针对性文档检索。
      - paragraph [ref=e1570]: 优劣对比（概览）：
      - list [ref=e1571]:
        - listitem [ref=e1572]: 知识驱动：高精度/高可解释，但覆盖与容错受限于图谱完备性。
        - listitem [ref=e1573]: 索引驱动：集成成本低，但显式推理弱、可解释性一般。
        - listitem [ref=e1574]: 混合型：综合表现更稳健，但系统复杂度与工程成本较高。
      - heading "三、前沿GraphRAG框架介绍（截至2025年）" [level=2] [ref=e1575]:
        - link "三、前沿GraphRAG框架介绍（截至2025年）" [ref=e1576] [cursor=pointer]:
          - /url: "#/chapter7/20_kg_rag?id=%e4%b8%89%e3%80%81%e5%89%8d%e6%b2%bfgraphrag%e6%a1%86%e6%9e%b6%e4%bb%8b%e7%bb%8d%ef%bc%88%e6%88%aa%e8%87%b32025%e5%b9%b4%ef%bc%89"
      - paragraph [ref=e1577]: 近年来，学术界和工业界涌现出一批具有代表性的GraphRAG框架，它们在架构设计和应用场景上各有侧重。
      - heading "3.1 GraphRAG (Microsoft)" [level=3] [ref=e1578]:
        - link "3.1 GraphRAG (Microsoft)" [ref=e1579] [cursor=pointer]:
          - /url: "#/chapter7/20_kg_rag?id=_31-graphrag-microsoft"
      - paragraph [ref=e1580]:
        - text: GraphRAG是一个重量级的框架，其核心思想是“先构建全局知识，再按需检索”
        - superscript [ref=e1581]:
          - link "1" [ref=e1582] [cursor=pointer]:
            - /url: "#fn-1"
        - superscript [ref=e1583]:
          - link "2" [ref=e1584] [cursor=pointer]:
            - /url: "#fn-2"
        - text: 。典型流程：
      - list [ref=e1585]:
        - listitem [ref=e1586]: 文本→三元组/子图构建→图谱（属性图）；
        - listitem [ref=e1587]: 采用社区检测（如Leiden）进行图划分，按层级生成全局/社区/局部摘要；
        - listitem [ref=e1588]: 查询时先匹配全局/社区摘要，再下钻到局部子图与原文证据；
        - listitem [ref=e1589]: 根据需要返回“全局观”与“证据路径”并行的双视角答案。
      - paragraph [ref=e1590]: 该方法的优势是提供强全局感知与良好可解释性，适合探索性分析、全景总结与多跳问答；但前期构建与分层摘要成本较高，对数据持续变更的场景需设计批处理/增量更新与缓存策略。
      - heading "3.2 LightRAG" [level=3] [ref=e1591]:
        - link "3.2 LightRAG" [ref=e1592] [cursor=pointer]:
          - /url: "#/chapter7/20_kg_rag?id=_32-lightrag"
      - paragraph [ref=e1593]:
        - text: 针对 GraphRAG 的“重量”问题，LightRAG 旨在实现轻量、高效、易扩展
        - superscript [ref=e1594]:
          - link "3" [ref=e1595] [cursor=pointer]:
            - /url: "#fn-3"
        - superscript [ref=e1596]:
          - link "4" [ref=e1597] [cursor=pointer]:
            - /url: "#fn-4"
        - text: ：
      - list [ref=e1598]:
        - listitem [ref=e1599]: 核心思路常见为“双层检索”与“图增强索引”，以较低构建成本获得全局-局部兼顾的检索能力；
        - listitem [ref=e1600]: 更强调将结构信号嵌入到文本索引与重排中，弱化复杂的社区发现流程；
        - listitem [ref=e1601]: 适用于资源受限、快速迭代与在线更新场景。
      - heading "3.3 FRAG (Flexible RAG)" [level=3] [ref=e1602]:
        - link "3.3 FRAG (Flexible RAG)" [ref=e1603] [cursor=pointer]:
          - /url: "#/chapter7/20_kg_rag?id=_33-frag-flexible-rag"
      - paragraph [ref=e1604]:
        - text: FRAG强调“灵活性”与“模块化”，以自适应不同复杂度的查询
        - superscript [ref=e1605]:
          - link "5" [ref=e1606] [cursor=pointer]:
            - /url: "#fn-5"
        - text: ：
      - list [ref=e1607]:
        - listitem [ref=e1608]: 查询分流：通过分类器或规则将请求判定为简单/复杂；
        - listitem [ref=e1609]: 简单查询：直接实体链接+属性查找，低延迟返回；
        - listitem [ref=e1610]: 复杂查询：激活路径检索/多跳推理模块，再融合文本证据；
        - listitem [ref=e1611]: 易扩展：模块化设计与预训练LLM能力复用，迁移成本低。
      - heading "3.4 GraphIRAG (Iterative Knowledge Retrieval)" [level=3] [ref=e1612]:
        - link "3.4 GraphIRAG (Iterative Knowledge Retrieval)" [ref=e1613] [cursor=pointer]:
          - /url: "#/chapter7/20_kg_rag?id=_34-graphirag-iterative-knowledge-retrieval"
      - paragraph [ref=e1614]:
        - text: GraphIRAG 引入“迭代检索”思想，认为单次检索不足以解决复杂问题
        - superscript [ref=e1615]:
          - link "6" [ref=e1616] [cursor=pointer]:
            - /url: "#fn-6"
        - text: ：
      - list [ref=e1617]:
        - listitem [ref=e1618]: 由控制器在生成中多轮触发图查询，逐步补齐证据链；
        - listitem [ref=e1619]: 以“新信息增益”为准则决定是否继续迭代与何时停止；
        - listitem [ref=e1620]: 对时间敏感与多跳推理任务更具鲁棒性。
      - heading "四、性能评估与基准测试" [level=2] [ref=e1621]:
        - link "四、性能评估与基准测试" [ref=e1622] [cursor=pointer]:
          - /url: "#/chapter7/20_kg_rag?id=%e5%9b%9b%e3%80%81%e6%80%a7%e8%83%bd%e8%af%84%e4%bc%b0%e4%b8%8e%e5%9f%ba%e5%87%86%e6%b5%8b%e8%af%95"
      - heading "4.1 核心评估指标" [level=3] [ref=e1623]:
        - link "4.1 核心评估指标" [ref=e1624] [cursor=pointer]:
          - /url: "#/chapter7/20_kg_rag?id=_41-%e6%a0%b8%e5%bf%83%e8%af%84%e4%bc%b0%e6%8c%87%e6%a0%87"
      - paragraph [ref=e1625]: GraphRAG 的评估体系是多维度的，主要涵盖三个方面。
      - paragraph [ref=e1626]:
        - strong [ref=e1627]: 检索质量
        - text: ：
      - list [ref=e1628]:
        - listitem [ref=e1629]: 传统：精确率（Precision）、召回率（Recall）、F1、命中率（Hit Rate@K）。
        - listitem [ref=e1630]:
          - text: RAG特有：
          - list [ref=e1631]:
            - listitem [ref=e1632]: 上下文精确率（Context Precision）= 检索到的上下文中“真正相关”的比例；
            - listitem [ref=e1633]: 上下文召回率（Context Recall）= 所有应当支持答案的“金标准证据”被检回的比例；
            - listitem [ref=e1634]: 引用/归因准确率（Citation/Attribution）= 生成答案中的关键断言是否被检索证据正确支撑。
      - paragraph [ref=e1635]:
        - strong [ref=e1636]: 生成质量
        - text: ：
      - list [ref=e1637]:
        - listitem [ref=e1638]: 问答：精确匹配（EM）、F1；
        - listitem [ref=e1639]: 摘要：ROUGE；
        - listitem [ref=e1640]: 事实一致性/忠实度（Faithfulness）：断言与证据的一致性，可配合“逐句打标+归因检查”。
      - paragraph [ref=e1641]:
        - strong [ref=e1642]: 系统性能
        - text: ：
      - paragraph [ref=e1643]: 推理延迟（Latency）是从接收查询到返回最终答案所需的总时间，是衡量系统响应速度的核心指标。吞吐量（Throughput）指系统在单位时间内能处理的查询数量（QPS）。成本（Cost）包括API调用次数、计算资源（GPU/CPU）和内存消耗等。
      - heading "4.2 常用基准数据集" [level=3] [ref=e1644]:
        - link "4.2 常用基准数据集" [ref=e1645] [cursor=pointer]:
          - /url: "#/chapter7/20_kg_rag?id=_42-%e5%b8%b8%e7%94%a8%e5%9f%ba%e5%87%86%e6%95%b0%e6%8d%ae%e9%9b%86"
      - paragraph [ref=e1646]: 学术界已经建立了一系列基准数据集来评测GraphRAG在不同任务上的能力。
      - paragraph [ref=e1647]:
        - strong [ref=e1648]: 多跳问答
        - text: 数据集要求模型在多个知识源之间进行推理，是检验GraphRAG核心能力的试金石。代表性数据集包括 HotpotQA、2WikiMultihopQA 和 MuSiQue。
      - paragraph [ref=e1649]:
        - strong [ref=e1650]: 复杂问答
        - text: 数据集包含结构复杂的查询，代表性数据集包括 WebQSP 和 ComplexWebQuestions (CWQ)。
      - paragraph [ref=e1651]:
        - strong [ref=e1652]: 知识图谱驱动的QA
        - text: 是专门为评估知识图谱问答能力设计的数据集，如 KGQAgen-10k。
      - paragraph [ref=e1653]: 不过，一些研究指出，部分现有基准（如WebQSP）存在数据质量问题或评估方法过于僵化（如严格的EM），可能导致对模型性能的低估。因此，构建更高质量、更科学的基准是未来的一个重要方向。
      - heading "五、生产环境部署实践与挑战" [level=2] [ref=e1654]:
        - link "五、生产环境部署实践与挑战" [ref=e1655] [cursor=pointer]:
          - /url: "#/chapter7/20_kg_rag?id=%e4%ba%94%e3%80%81%e7%94%9f%e4%ba%a7%e7%8e%af%e5%a2%83%e9%83%a8%e7%bd%b2%e5%ae%9e%e8%b7%b5%e4%b8%8e%e6%8c%91%e6%88%98"
      - paragraph [ref=e1656]: 将GraphRAG框架从实验室推向生产环境，面临着一系列独特的工程和技术挑战。
      - list [ref=e1657]:
        - listitem [ref=e1658]:
          - paragraph [ref=e1659]:
            - strong [ref=e1660]: 知识图谱的构建与动态维护
            - text: ：高质量知识图谱的构建本身就是一项耗时耗力的知识工程。在生产环境中，知识需要持续保持最新状态，如何设计高效、准确、低成本的动态更新机制是核心难点。
        - listitem [ref=e1661]:
          - paragraph [ref=e1662]:
            - strong [ref=e1663]: 系统性能与可扩展性
            - text: ：随着知识库规模和用户查询量的增长，系统的响应延迟、吞吐量和资源消耗成为主要瓶颈。生产部署需要应对向量化速度慢、内存溢出、API 失败等具体问题。
        - listitem [ref=e1664]:
          - paragraph [ref=e1665]:
            - strong [ref=e1666]: 安全与隐私保护
            - text: ：RAG 系统引入外部数据源，带来了新的安全风险，包括数据隐私泄露、模型被注入恶意数据（模型中毒）、以及针对检索模块的攻击等。
        - listitem [ref=e1667]:
          - paragraph [ref=e1668]:
            - strong [ref=e1669]: 成本控制
            - text: ：大规模部署 GraphRAG 系统需要大量的计算和存储资源，如何优化系统架构以降低运营成本是一个重要的商业考量。
      - heading "参考文献" [level=2] [ref=e1670]:
        - link "参考文献" [ref=e1671] [cursor=pointer]:
          - /url: "#/chapter7/20_kg_rag?id=%e5%8f%82%e8%80%83%e6%96%87%e7%8c%ae"
      - paragraph [ref=e1673]:
        - 'link "Edge et al. (2024). From Local to Global: A Graph RAG Approach to Query-Focused Summarization" [ref=e1674] [cursor=pointer]':
          - /url: https://arxiv.org/abs/2404.16130
          - text: Edge et al. (2024).
          - emphasis [ref=e1675]: "From Local to Global: A Graph RAG Approach to Query-Focused Summarization"
        - link "↩" [ref=e1676] [cursor=pointer]:
          - /url: "#fnref-1"
      - paragraph [ref=e1678]:
        - link "Microsoft GraphRAG Documentation" [ref=e1679] [cursor=pointer]:
          - /url: https://microsoft.github.io/graphrag/
