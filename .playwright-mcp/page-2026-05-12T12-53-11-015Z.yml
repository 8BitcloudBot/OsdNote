      - blockquote [ref=e356]:
        - paragraph [ref=e357]:
          - link "完整代码" [ref=e358] [cursor=pointer]:
            - /url: https://github.com/datawhalechina/all-in-rag/blob/main/code/C4/06_embedding_based_routing.py
      - heading "2.3 LlamaIndex 拓展" [level=3] [ref=e359]:
        - link "2.3 LlamaIndex 拓展" [ref=e360] [cursor=pointer]:
          - /url: "#/chapter4/14_query_rewriting?id=_23-llamaindex-%e6%8b%93%e5%b1%95"
      - paragraph [ref=e361]:
        - text: 与 LangChain 类似，LlamaIndex 也提供了强大的查询路由功能
        - superscript [ref=e362]:
          - link "7" [ref=e363] [cursor=pointer]:
            - /url: "#fn-7"
        - text: ，其思路是将不同的数据源或查询策略包装为“工具（Tool）”，然后通过一个“路由器（Router）”来为用户查询动态选择最合适的工具。实现方式与 LangChain 有异曲同工之处：
      - list [ref=e364]:
        - listitem [ref=e365]:
          - paragraph [ref=e366]:
            - strong [ref=e367]: 基于LLM的意图识别
            - text: ：这是 LlamaIndex 的主要实现方式。通过
            - code [ref=e368]: RouterQueryEngine
            - text: 来管理一组
            - code [ref=e369]: QueryEngineTool
            - text: 。每个
            - code [ref=e370]: Tool
            - text: 都包含一个查询引擎和一段描述其功能的文本。路由器会利用一个
            - code [ref=e371]: Selector
            - text: （如
            - code [ref=e372]: LLMSingleSelector
            - text: 或更稳定的
            - code [ref=e373]: PydanticSingleSelector
            - text: ）来让 LLM 根据工具的描述文本和用户问题进行语义匹配，从而选择一个或多个最合适的工具来执行。
        - listitem [ref=e374]:
          - paragraph [ref=e375]:
            - strong [ref=e376]: 嵌入相似性路由
            - text: ：LlamaIndex 没有提供直接基于向量相似度计算的独立路由组件。它的“语义路由”是融合在基于 LLM 的意图识别中的——即让 LLM 理解每个
            - code [ref=e377]: Tool
            - text: 描述的
            - emphasis [ref=e378]: 语义
            - text: ，并据此做出决策。这种方式更灵活，能够处理更复杂的路由逻辑，而不仅仅是文本相似度匹配。
      - heading "参考文献" [level=2] [ref=e379]:
