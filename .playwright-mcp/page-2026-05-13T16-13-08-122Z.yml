            - code [ref=e743]: q
            - text: 个查询的平均精确率（Average Precision）。
      - paragraph [ref=e744]: 要计算上述所有指标，前提是拥有一个高质量的标注数据集，其中包含了查询和每个查询对应的“真实”相关文档。
      - heading "2.2 响应评估" [level=3] [ref=e745]:
        - link "2.2 响应评估" [ref=e746] [cursor=pointer]:
          - /url: "#/chapter6/18_system_evaluation?id=_22-%e5%93%8d%e5%ba%94%e8%af%84%e4%bc%b0"
      - paragraph [ref=e747]:
        - text: 响应评估覆盖了RAG三元组中的
        - strong [ref=e748]: 忠实度
        - text: 和
        - strong [ref=e749]: 答案相关性
        - text: 。此环节通常采用
        - strong [ref=e750]: 端到端
        - text: 的评估范式，因为它直接衡量用户感知的最终输出质量。无论采用何种评估方法，都主要围绕以下两个核心维度展开。
      - heading "2.2.1 评估维度" [level=4] [ref=e751]:
        - link "2.2.1 评估维度" [ref=e752] [cursor=pointer]:
          - /url: "#/chapter6/18_system_evaluation?id=_221-%e8%af%84%e4%bc%b0%e7%bb%b4%e5%ba%a6"
      - paragraph [ref=e753]:
        - text: （1）
        - strong [ref=e754]: 忠实度 / 可信度
        - text: ：衡量生成的答案在多大程度上可以由给定的上下文所证实。一个完全忠实的答案，其所有内容都必须能在上下文中找到依据，以此避免模型产生“幻觉”。
      - paragraph [ref=e755]:
        - text: （2）
        - strong [ref=e756]: 答案相关性
        - text: ：衡量生成的答案与用户原始查询的对齐程度。一个高相关性的答案必须是直接的、切题的，并且不包含与问题无关的冗余信息。
      - heading "2.2.2 主要评估方法" [level=4] [ref=e757]:
        - link "2.2.2 主要评估方法" [ref=e758] [cursor=pointer]:
          - /url: "#/chapter6/18_system_evaluation?id=_222-%e4%b8%bb%e8%a6%81%e8%af%84%e4%bc%b0%e6%96%b9%e6%b3%95"
      - paragraph [ref=e759]: 针对上述维度，目前主要有两类评估方法：
      - paragraph [ref=e760]:
        - text: （1）
        - strong [ref=e761]: 基于大语言模型的评估
      - paragraph [ref=e762]: 这是一种强大的评估方法，能够提供更深度的语义评估，正逐渐成为主流选择。利用一个高性能、中立的llm作为“评估者”，对上述维度进行深度的语义理解和打分。
      - list [ref=e763]:
        - listitem [ref=e764]:
          - strong [ref=e765]: 忠实度评估：
          - text: 首先，将生成的答案分解为一系列独立的声明或断言（Claims）。然后，对于每一个断言，在提供的上下文中进行验证，判断其真伪。最终的忠实度分数是所有被上下文证实的断言所占的比例。
        - listitem [ref=e766]:
          - strong [ref=e767]: 答案相关性评估：
          - text: 评估者需要同时分析用户查询和生成的答案。评分时会惩罚那些答非所问、信息不完整或包含过多无关细节的答案。
      - paragraph [ref=e768]:
        - text: （2）
        - strong [ref=e769]: 基于词汇重叠的经典指标
      - paragraph [ref=e770]: 这类指标需要在数据集中包含一个或多个“标准答案”。它们通过计算生成答案与标准答案之间 n-gram（连续的n个词）的重叠程度来评估质量。
      - list [ref=e771]:
        - listitem [ref=e772]:
          - paragraph [ref=e773]:
            - strong [ref=e774]: "ROUGE (Recall-Oriented Understudy for Gisting Evaluation):"
            - text: ROUGE关注的重点是
            - strong [ref=e775]: 召回率
            - text: ，即标准答案中的词语有多少被生成答案所覆盖，因此常用于评估内容的
            - strong [ref=e776]: 完整性
            - text: 。其常用变体包括计算n-gram的
            - code [ref=e777]: ROUGE-N
            - text: 和计算最长公共子序列的
            - code [ref=e778]: ROUGE-L
            - text: 。
          - paragraph [ref=e779]:
