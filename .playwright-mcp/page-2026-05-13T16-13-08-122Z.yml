      - blockquote [ref=e988]:
        - paragraph [ref=e989]: 为了更直观地理解三者的区别，来看一个简单的例子。
        - paragraph [ref=e990]:
          - strong [ref=e991]: 假设：
        - list [ref=e992]:
          - listitem [ref=e993]:
            - strong [ref=e994]: 参考答案：
            - code [ref=e995]: 狗 在 床 上面
            - text: (共5个词)
          - listitem [ref=e996]:
            - strong [ref=e997]: 生成答案：
            - code [ref=e998]: 狗 在 床 上
            - text: (共4个词)
        - paragraph [ref=e999]:
          - strong [ref=e1000]: 评估分析：
        - list [ref=e1001]:
          - listitem [ref=e1002]:
            - paragraph [ref=e1003]:
              - strong [ref=e1004]: "ROUGE (召回率导向):"
              - text: 从召回率的角度出发：“参考答案里的5个词，生成答案覆盖了多少？”——覆盖了4个。因此，它的召回率很高（ROUGE-1 为 4/5），得分会不错。ROUGE更关心“说全了没”。
          - listitem [ref=e1005]:
            - paragraph [ref=e1006]:
              - strong [ref=e1007]: "BLEU (精确率导向):"
              - text: 从精确率的角度进行评判：“生成答案里的4个词，有多少是有效的（在参考答案里）？”——全部有效，精确率很高。但它会发现生成答案比参考答案短，于是通过
              - strong [ref=e1008]: 长度惩罚(Brevity Penalty)
              - text: 进行扣分。BLEU更关心“说对了没，以及长度是否合适”。
          - listitem [ref=e1009]:
            - paragraph [ref=e1010]:
              - strong [ref=e1011]: "METEOR (综合平衡):"
              - text: 同时计算精确率和召回率，并取一个调和平均。在这个例子里，词序是完全正确的，惩罚项为0。METEOR会在“说全”和“说对”之间找到一个最佳平衡点。
      - heading "2.2.3 方法对比和总结" [level=4] [ref=e1012]:
        - link "2.2.3 方法对比和总结" [ref=e1013] [cursor=pointer]:
          - /url: "#/chapter6/18_system_evaluation?id=_223-%e6%96%b9%e6%b3%95%e5%af%b9%e6%af%94%e5%92%8c%e6%80%bb%e7%bb%93"
      - paragraph [ref=e1014]:
        - text: 基于LLM的评估更注重
        - strong [ref=e1015]: 语义和逻辑
        - text: ，评估质量高，但成本也更高且存在评估者偏见。基于词汇重叠的指标
        - strong [ref=e1016]: 客观、计算快、成本低
        - text: ，但无法理解语义，可能误判同义词或释义。在实践中，可以将两者结合，使用经典指标进行快速、大规模的初步筛选，再利用LLM进行更精细的评估。
