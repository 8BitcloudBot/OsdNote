            - text: BLEU侧重于评估
            - strong [ref=e819]: 精确率
            - text: ，衡量生成的答案中有多少词是有效的（即在标准答案中出现过）。它还引入了长度惩罚机制，避免模型生成过短的句子，因此更适合评估答案的
            - strong [ref=e820]: 流畅度和准确性
