    - article [ref=e22]:
      - generic [ref=e400]: 2769 字 | 7 分钟
      - heading "第一节 评估介绍" [level=1] [ref=e401]:
        - link "第一节 评估介绍" [ref=e402] [cursor=pointer]:
          - /url: "#/chapter6/18_system_evaluation?id=%e7%ac%ac%e4%b8%80%e8%8a%82-%e8%af%84%e4%bc%b0%e4%bb%8b%e7%bb%8d"
      - blockquote [ref=e403]:
        - paragraph [ref=e404]: 构建RAG系统后，下一个关键问题是：如何科学地评估其表现？
      - paragraph [ref=e405]: 评估之所以关键，是因为它回答了RAG开发与应用中的一系列核心问题：
      - list [ref=e406]:
        - listitem [ref=e407]:
          - strong [ref=e408]: 对于开发者：
          - text: 如何量化地追踪、迭代并提升RAG应用的性能？当系统出现“幻觉”或答非所问时，如何快速定位问题根源？
        - listitem [ref=e409]:
          - strong [ref=e410]: 对于用户或决策者：
          - text: 面对两个不同的RAG应用，如何客观地评判孰优孰劣？
      - paragraph [ref=e411]:
        - text: 本节将探讨RAG评估的理念与方法，并围绕
        - strong [ref=e412]: “RAG三元组（RAG Triad）”
        - text: 展开。
      - paragraph [ref=e413]:
        - img "RAG Triad"
      - heading "一、RAG评估三元组" [level=2] [ref=e414]:
        - link "一、RAG评估三元组" [ref=e415] [cursor=pointer]:
          - /url: "#/chapter6/18_system_evaluation?id=%e4%b8%80%e3%80%81rag%e8%af%84%e4%bc%b0%e4%b8%89%e5%85%83%e7%bb%84"
      - paragraph [ref=e416]:
        - text: 该架构包含以下三个维度，并在
        - strong [ref=e417]: TruLens
        - superscript [ref=e418]:
          - link "1" [ref=e419] [cursor=pointer]:
            - /url: "#fn-1"
        - text: 等工具中有深入的应用：
      - paragraph [ref=e420]:
        - text: （1）
        - strong [ref=e421]: 上下文相关性 (Context Relevance)
      - list [ref=e422]:
        - listitem [ref=e423]:
          - strong [ref=e424]: 评估目标：
          - text: 检索器（Retriever）的性能。
        - listitem [ref=e425]:
          - strong [ref=e426]: 核心问题：
          - text: 检索到的上下文内容，是否与用户的查询（Query）高度相关？
        - listitem [ref=e427]:
          - strong [ref=e428]: 重要性：
          - text: 检索是RAG应用在响应用户查询时的第一步。如果检索回来的上下文充满了噪声或无关信息，那么无论后续的生成模型多么强大，都没法做出正确答案。
      - paragraph [ref=e429]:
        - text: （2）
        - strong [ref=e430]: 忠实度 / 可信度 (Faithfulness / Groundedness)
      - list [ref=e431]:
        - listitem [ref=e432]:
          - strong [ref=e433]: 评估目标：
          - text: 生成器的可靠性。
        - listitem [ref=e434]:
          - strong [ref=e435]: 核心问题：
          - text: 生成的答案是否完全基于所提供的上下文信息？
        - listitem [ref=e436]:
          - strong [ref=e437]: 重要性：
          - text: 这个维度主要在于量化LLM的“幻觉”程度。一个高忠实度的回答意味着模型严格遵守了上下文，没有捏造或歪曲事实。如果忠实度得分低，说明LLM在回答时“自由发挥”过度，引入了外部知识或不实信息。
      - paragraph [ref=e438]:
        - text: （3）
        - strong [ref=e439]: 答案相关性 (Answer Relevance)
      - list [ref=e440]:
        - listitem [ref=e441]:
          - strong [ref=e442]: 评估目标：
          - text: 系统的端到端（End-to-End）表现。
        - listitem [ref=e443]:
          - strong [ref=e444]: 核心问题：
          - text: 最终生成的答案是否直接、完整且有效地回答了用户的原始问题？
        - listitem [ref=e445]:
          - strong [ref=e446]: 重要性：
          - text: 这是用户最直观的感受。一个答案可能完全基于上下文（高忠实度），但如果它答非所问，或者只回答了问题的一部分，那么这个答案的相关性就很低。例如，当用户问“法国在哪里，首都是哪里？”，如果答案只是“法国在西欧”，那么虽然忠实度高，但答案相关性很低。
      - blockquote [ref=e447]:
        - paragraph [ref=e448]: 你可能觉得忠实度和答案相关性很相似，但它们的侧重点是不同的。忠实度更关注模型是否严格遵循了上下文，而答案相关性则更关注模型是否直接、完整且有效地回答了问题。
      - paragraph [ref=e449]: 通过对这三个维度进行评估，可以对RAG系统的表现有一个全面而细致的了解，并能准确定位问题所在：是检索出了问题，还是生成环节有待改进。
      - heading "二、评估工作流" [level=2] [ref=e450]:
        - link "二、评估工作流" [ref=e451] [cursor=pointer]:
          - /url: "#/chapter6/18_system_evaluation?id=%e4%ba%8c%e3%80%81%e8%af%84%e4%bc%b0%e5%b7%a5%e4%bd%9c%e6%b5%81"
      - paragraph [ref=e452]:
        - text: 虽然上面把评估分成了三个部分，但实际上可以把评估过程拆解为两个主要环节：
        - strong [ref=e453]: 检索评估
        - text: 和
        - strong [ref=e454]: 响应评估
        - text: 。
      - heading "2.1 检索评估" [level=3] [ref=e455]:
        - link "2.1 检索评估" [ref=e456] [cursor=pointer]:
          - /url: "#/chapter6/18_system_evaluation?id=_21-%e6%a3%80%e7%b4%a2%e8%af%84%e4%bc%b0"
      - paragraph [ref=e457]:
        - text: 检索评估聚焦于RAG三元组中的
        - strong [ref=e458]:
          - text: 上下文相关性 (Context Relevance)
          - strong [ref=e459]: ，本质上是一次
          - text: 白盒测试
        - superscript [ref=e460]:
          - link "2" [ref=e461] [cursor=pointer]:
            - /url: "#fn-2"
        - text: 。此阶段的评估需要一个标注数据集，其中包含一系列查询以及每个查询对应的真实相关文档。
      - paragraph [ref=e462]: 这项评估借鉴了信息检索领域的多个经典指标：
      - list [ref=e463]:
        - listitem [ref=e464]:
